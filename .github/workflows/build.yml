name: Build
on:
  push:
    branches:
      - master
      - branch-*
      - dogfood-*
  pull_request:
  merge_group:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *' # nightly build at 1AM UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: github-ubuntu-latest-s  # Public repo - uses github-ubuntu-latest-s
    name: Build
    permissions:
      id-token: write  # Required for Vault OIDC authentication
      contents: write  # Required for repository access and tagging
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.3.9
      - uses: SonarSource/ci-github-actions/build-maven@9d3488f52305895f599feb1ec8560c1a5339aa99 # 1.8.1
        with:
          deploy-pull-request: true
          artifactory-reader-role: private-reader
          artifactory-deployer-role: qa-deployer

  plugin_qa:
    needs: [ build ]
    runs-on: github-ubuntu-latest-s  # Public repo - uses github-ubuntu-latest-s
    name: Plugin QA
    permissions:
      id-token: write
      contents: write
    strategy:
      matrix:
        sq_version: [LATEST_RELEASE, DEV]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.3.9
      - uses: SonarSource/ci-github-actions/config-maven@9d3488f52305895f599feb1ec8560c1a5339aa99 # 1.8.1
        with:
          artifactory-reader-role: private-reader
      - name: Vault
        id: secrets
        uses: SonarSource/vault-action-wrapper@881045d830534a70ec3c7c275fa3714412c8ff6e # 3.6.1
        with:
          secrets: |
            development/github/token/licenses-ro token | GITHUB_TOKEN;
      - name: Run Plugin QA Tests
        working-directory: its/plugin
        env:
          GITHUB_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).GITHUB_TOKEN }}
          SONARSOURCE_REPOSITORY_URL: https://repox.jfrog.io/artifactory/sonarsource-qa
          SONARSOURCE_QA: true
        run: |
          mvn test -DjavaVersion="LATEST_RELEASE" -Dsonar.runtimeVersion=${{ matrix.sq_version }} -Dmaven.test.redirectTestOutputToFile=false -B -e -V
      - name: Generate test report on failure
        uses: dorny/test-reporter@df6247429542221bc30d46a036ee47af1102c451 # v2.7.0
        if: failure()
        with:
          name: Plugin QA Test Report
          reporter: java-junit
          path: its/plugin/**/target/surefire-reports/TEST-*.xml
          list-suites: "failed"
          list-tests: "failed"

  promote:
    needs: [ plugin_qa ]
    runs-on: github-ubuntu-latest-s  # Public repo - uses github-ubuntu-latest-s
    name: Promote
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: SonarSource/ci-github-actions/promote@9d3488f52305895f599feb1ec8560c1a5339aa99 # 1.8.1
        with:
          promote-pull-request: true
